<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dox me :3</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        height: 100dvh;
        width: 100%;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* Background image */
    .bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 0;
    }

    /* Bouncing chicken */
    .chicken {
        position: absolute;
        width: 120px;
        height: auto;
        z-index: 1;
        pointer-events: none;
    }

    /* Rainbow text */
    .rainbow-text {
        position: relative;
        z-index: 2;
        font-size: clamp(24px, 5vw, 60px);
        font-weight: bold;
        font-family: Arial, sans-serif;
        text-align: center;

        background: linear-gradient(
            90deg,
            red,
            orange,
            yellow,
            green,
            cyan,
            blue,
            violet
        );
        background-size: 400%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;

        animation: rainbow 6s linear infinite;
        text-shadow: 0 0 10px rgba(0,0,0,0.6);
    }

    @keyframes rainbow {
        0% { background-position: 0% }
        100% { background-position: 400% }
    }
</style>
</head>

<body>

<img src="/image.png" class="bg">
<img src="/IMG_6955.jpeg" class="chicken" id="chicken">
<div class="rainbow-text">tg: slitfortelly</div>

<script>
    const chicken = document.getElementById("chicken");

    let x = 100;
    let y = 100;
    let dx = 4; // speed (increase for faster)
    let dy = 4;

    function animate() {
        const rect = chicken.getBoundingClientRect();
        const screenW = window.innerWidth;
        const screenH = window.innerHeight;

        if (x + rect.width >= screenW || x <= 0) dx *= -1;
        if (y + rect.height >= screenH || y <= 0) dy *= -1;

        x += dx;
        y += dy;

        chicken.style.transform = `translate(${x}px, ${y}px)`;

        requestAnimationFrame(animate);
    }

    animate();
</script>

</body>
</html>
