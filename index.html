<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dox me :3 <title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
    }

    /* Background */
    .bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        z-index: 0;
    }

    /* Chicken */
    .chicken {
        position: fixed;
        width: 120px;
        z-index: 1;
        pointer-events: none;
    }

    /* Text */
    .rainbow-text {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 2;

        font-size: clamp(24px, 6vw, 64px);
        font-weight: bold;
        font-family: Arial, sans-serif;

        background: linear-gradient(
            90deg,
            red, orange, yellow, green, cyan, blue, violet
        );
        background-size: 300%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;

        animation: rainbow 4s linear infinite;
        text-shadow: 0 0 12px rgba(0,0,0,0.7);
    }

    @keyframes rainbow {
        0% { background-position: 0% }
        100% { background-position: 300% }
    }
</style>
</head>

<body>

<img src="/image.png" class="bg">
<img src="/chicken.png" class="chicken" id="chicken">
<div class="rainbow-text">tg: slitfortelly</div>

<script>
const chicken = document.getElementById("chicken");

let x = 80;
let y = 80;
let dx = 7;
let dy = 7;

let screenW, screenH, w, h;

function updateSizes() {
    screenW = window.innerWidth;
    screenH = window.innerHeight;
    w = chicken.offsetWidth;
    h = chicken.offsetHeight;
}

// keep sizes correct on resize/orientation change
window.addEventListener("resize", updateSizes);

function animate() {
    if (x + w >= screenW) {
        x = screenW - w;
        dx *= -1;
    }
    if (x <= 0) {
        x = 0;
        dx *= -1;
    }

    if (y + h >= screenH) {
        y = screenH - h;
        dy *= -1;
    }
    if (y <= 0) {
        y = 0;
        dy *= -1;
    }

    x += dx;
    y += dy;

    chicken.style.transform = `translate(${x}px, ${y}px)`;

    requestAnimationFrame(animate);
}

chicken.onload = () => {
    updateSizes();
    animate();
};

// if cached
if (chicken.complete) {
    updateSizes();
    animate();
}
</script>

</body>
</html>
